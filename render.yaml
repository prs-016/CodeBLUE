services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: threshold-backend
    runtime: docker
    dockerfilePath: threshold/backend/Dockerfile
    dockerContext: threshold
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: sqlite:////app/backend/threshold.db
      - key: PYTHONPATH
        value: /app/backend
      # Add any secrets below (set values in the Render dashboard, not here):
      # - key: SNOWFLAKE_ACCOUNT
      #   sync: false
      # - key: STRIPE_SECRET_KEY
      #   sync: false

  # ── Frontend (React/Vite static site) ───────────────────────────────────────
  - type: web
    name: threshold-frontend
    runtime: static
    rootDir: threshold/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Set this to your backend's Render URL after the backend is deployed.
      # e.g. https://threshold-backend.onrender.com
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
