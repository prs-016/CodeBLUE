services:
  backend:
    build: 
      context: ./backend
    ports: 
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./ml/saved_models:/app/models
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: 
      context: ./frontend
    ports: 
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000

  data_pipeline:
    build: 
      context: ./data
    command: python run_all_ingestion.py
    volumes:
      - ./data:/app/data
