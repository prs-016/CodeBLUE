services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./threshold.db}
      PYTHONPATH: /app/backend
    volumes:
      - ./:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app/backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000

  data_pipeline:
    build:
      context: .
      dockerfile: data/Dockerfile
    env_file:
      - .env
    volumes:
      - ./:/app
    working_dir: /app/data
    command: python run_all_ingestion.py
    profiles:
      - data

  blockchain_client:
    image: node:20-bookworm-slim
    env_file:
      - .env
    working_dir: /app/blockchain
    volumes:
      - ./:/app
    command: sh -lc "npm install --no-fund --no-audit && node client/interact.js health"
    profiles:
      - blockchain
